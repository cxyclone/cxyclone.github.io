baseURL: "http://cxyclone.github.io"
languageCode: "zh"
title: "CXYCLONE的博客"
theme: "PaperMod"
copyright : "© 2025 CXYLONE"
enableRobotsTXT: false
buildDrafts: true
buildFuture: true
buildExpired: true
enableEmoji: true
pygmentsUseClasses: false
hasCJKLanguage: true

minify:
  disableXML: true
  minifyOutput: true

pagination:
  disableAliases: false
  pagerSize: 10

params:
  defaultTheme: dark
  disableThemeToggle: true

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: false
  UseHugoToc: false
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false

  showtoc: true
  tocopen: true

  profileMode:
    enabled: true
    title: "CXYCLONE的博客"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.2
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home:
    - HTML
    - RSS
    - JSON

menu:
  main:
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 10
    - identifier: search
      name: 搜索
      url: /search/
      weight: 20
    - identifier: github
      name: Github
      url: "https://github.com/cxyclone/cxyclone.github.io"
      weight: 30

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: true
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: "github-dark"

caches:
  images:
    dir: :cacheDir/images